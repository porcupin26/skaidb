<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>skaidb</title>
<link rel="stylesheet" href="/ui/app.css">
</head>
<body>
<header>
  <span class="logo">skaidb</span>
  <span id="node-badge" class="badge"></span>
  <span class="spacer"></span>
  <button id="logout" class="ghost" hidden>log out</button>
</header>

<main id="login-view" hidden>
  <form id="login-form" class="card login">
    <h1>skaidb</h1>
    <p id="login-hint" class="muted"></p>
    <label>user <input id="login-user" autocomplete="username" required></label>
    <label>password <input id="login-pass" type="password" autocomplete="current-password"></label>
    <label class="row"><input id="login-remember" type="checkbox"> remember for this tab</label>
    <button type="submit">connect</button>
    <p id="login-error" class="error" hidden></p>
  </form>
</main>

<main id="app-view" hidden>
  <nav id="tabs">
    <button data-tab="status" class="active">status</button>
    <button data-tab="query">query</button>
    <button data-tab="stats">stats</button>
  </nav>

  <section id="tab-status">
    <div class="cards">
      <div class="card">
        <h2>node</h2>
        <table class="kv" id="node-info"></table>
      </div>
      <div class="card">
        <h2>cluster</h2>
        <table class="kv" id="cluster-info"></table>
      </div>
      <div class="card wide">
        <h2>members</h2>
        <table id="members">
          <thead><tr><th>id</th><th>configured</th><th>in ring</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <p class="muted" id="status-refreshed"></p>
  </section>

  <section id="tab-query" hidden>
    <div class="card wide">
      <div class="qbar">
        <select id="q-canned">
          <option value="">canned…</option>
          <option>SHOW TABLES</option>
          <option>SHOW DATABASES</option>
          <option>SHOW INDEXES</option>
          <option>SHOW SEARCH INDEXES</option>
          <option>SHOW STATUS</option>
          <option>SHOW GRANTS</option>
        </select>
        <select id="q-history-sel">
          <option value="">history…</option>
        </select>
        <span class="spacer"></span>
        <span id="q-db" class="badge">db: default</span>
      </div>
      <textarea id="q-sql" rows="5" spellcheck="false"
        placeholder="SELECT … (Ctrl+Enter or ⌘Enter to run; Alt+↑/↓ for history)"></textarea>
      <div class="qbar">
        <button id="q-run">run</button>
        <span id="q-meta" class="muted"></span>
        <span class="spacer"></span>
        <button id="q-csv" class="ghost" hidden>export csv</button>
        <button id="q-json" class="ghost" hidden>export json</button>
      </div>
      <p id="q-error" class="error" hidden></p>
      <p id="q-banner" class="muted" hidden></p>
      <div id="q-results" class="results"></div>
    </div>
  </section>

  <section id="tab-stats" hidden>
    <div class="cards">
      <div class="card">
        <h2>queries</h2>
        <table class="kv" id="st-queries"></table>
      </div>
      <div class="card">
        <h2>storage</h2>
        <table class="kv" id="st-storage"></table>
      </div>
      <div class="card">
        <h2>cache &amp; wal</h2>
        <table class="kv" id="st-cache"></table>
      </div>
      <div class="card">
        <h2>search &amp; timeseries</h2>
        <table class="kv" id="st-search"></table>
      </div>
      <div class="card wide">
        <h2>tables</h2>
        <div class="results"><table id="st-tables">
          <thead><tr><th>table</th><th>live keys</th><th>tombstones</th><th>disk</th></tr></thead>
          <tbody></tbody>
        </table></div>
      </div>
      <div class="card wide">
        <h2>search indexes</h2>
        <div class="results"><table id="st-indexes">
          <thead><tr><th>index</th><th>docs</th><th>disk</th><th>uncommitted</th></tr></thead>
          <tbody></tbody>
        </table></div>
      </div>
    </div>
    <p class="muted" id="stats-refreshed"></p>
  </section>
</main>

<script src="/ui/app.js"></script>
</body>
</html>
