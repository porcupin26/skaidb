[server]
bind_addr = "127.0.0.1"
quic_port = 7000
rest_port = 7080
node_role = "member"
data_dir = "/var/lib/skaidb"

[cluster]
seeds = []
internode_port = 7100
replication_factor = 3
vnodes_per_node = 256
default_read_consistency = "QUORUM"
default_write_consistency = "QUORUM"
# Background anti-entropy: each node repairs (schema + data) on this interval so
# missed DDL/writes converge without operator action. 0 disables it.
anti_entropy_interval_secs = 60

[agent]
subset_tables = []
max_staleness_ms = 5000

[auth]
scram_enabled = true
x509_enabled = false
x509_ca_file = ""
# Internode authentication: "none" (trusted network), "token" (shared secret),
# or "cert" (mutual TLS). Every node must use the same mode and material.
internode_auth = "none"
# token mode: inline secret (internode_token) or a file holding it (internode_keyfile)
internode_token = ""
internode_keyfile = ""
# cert mode: this node's cert + key, and the shared CA that signs all node certs
internode_tls_cert = ""
internode_tls_key = ""
internode_tls_ca = ""
superuser = "admin"
superuser_password = ""

[encryption]
tls_cert_file = ""
tls_key_file = ""
at_rest_enabled = false
at_rest_kek_source = "keyfile"
at_rest_keyfile = ""

[storage]
# Overall storage memory budget: "auto" = half the node's (cgroup) memory
# limit, or an explicit size like "256MB". When set it overrides
# memtable_size_mb and read_cache_entries below. Recommended on dedicated
# nodes; the fixed defaults below are deliberately small.
# memory_target = "auto"
memtable_size_mb = 256
# RAM read cache (entries) for point reads that miss the memtable; 0 disables.
read_cache_entries = 16384
compaction_strategy = "lazy_leveled"
use_io_uring = true

[observability]
prometheus_port = 9090
slow_query_ms = 200
query_log_enabled = true
query_log_masked = true
login_log_enabled = true
error_log_level = "warn"
# Main log destination. Empty = stderr (journald under systemd). Set a path and
# it becomes the catch-all log: operational/server events (startup, membership,
# anti-entropy) plus every audit category that doesn't have its own file below.
# Each category may override it with its own file (empty = use log_file). Missing
# files are created; categories sharing a path share a handle.
log_file = ""
query_log_file = ""
slow_query_log_file = ""
error_log_file = ""
login_log_file = ""
