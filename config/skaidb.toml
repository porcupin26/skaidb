[server]
bind_addr = "127.0.0.1"
quic_port = 7000
rest_port = 7080
node_role = "member"
data_dir = "/var/lib/skaidb"

[cluster]
seeds = []
internode_port = 7100
replication_factor = 3
vnodes_per_node = 256
default_read_consistency = "QUORUM"
default_write_consistency = "QUORUM"
# Background anti-entropy: each node repairs (schema + data) on this interval so
# missed DDL/writes converge without operator action. 0 disables it.
anti_entropy_interval_secs = 60

[agent]
subset_tables = []
max_staleness_ms = 5000

[auth]
scram_enabled = true
x509_enabled = false
x509_ca_file = ""
# Kerberos (SASL GSSAPI) client auth. Requires a build with the `kerberos`
# feature (glibc/macOS/Windows — the static-musl binary ships without it) and a
# readable service keytab. Clients then log in as external users created with
# `CREATE USER "user@REALM" GSSAPI` (no password). SCRAM stays available too.
gssapi_enabled = false
gssapi_keytab = ""              # e.g. "/etc/skaidb/skaidb.keytab"
# Optional explicit service principal; empty accepts whatever the keytab holds.
gssapi_service_principal = ""   # e.g. "skaidb/host.example.com@REALM"
# Internode authentication: "none" (trusted network), "token" (shared secret),
# or "cert" (mutual TLS). Every node must use the same mode and material.
internode_auth = "none"
# token mode: inline secret (internode_token) or a file holding it (internode_keyfile)
internode_token = ""
internode_keyfile = ""
# cert mode: this node's cert + key, and the shared CA that signs all node certs
internode_tls_cert = ""
internode_tls_key = ""
internode_tls_ca = ""
superuser = "admin"
superuser_password = ""

[encryption]
tls_cert_file = ""
tls_key_file = ""
at_rest_enabled = false
at_rest_kek_source = "keyfile"
at_rest_keyfile = ""

[storage]
# Overall storage memory budget: "auto" = half the node's (cgroup) memory
# limit, or an explicit size like "256MB". When set it overrides
# memtable_size_mb and read_cache_entries below. Recommended on dedicated
# nodes; the fixed defaults below are deliberately small.
# memory_target = "auto"
memtable_size_mb = 256
# RAM read cache (entries) for point reads that miss the memtable; 0 disables.
read_cache_entries = 16384
# Per-statement scan limits (memory safety). scan_row_budget caps rows a
# statement may examine; scan_byte_budget caps bytes it may materialize into a
# result set (bounds coordinator memory — a scan under the row budget can still
# gather GBs of multi-KB rows). 0 disables either. Defaults shown.
# scan_row_budget = 250000
# scan_byte_budget = 268435456  # 256 MB
compaction_strategy = "lazy_leveled"
use_io_uring = true

[observability]
prometheus_port = 9090
slow_query_ms = 200
query_log_enabled = true
query_log_masked = true
login_log_enabled = true
error_log_level = "warn"
# Main log destination. Empty = stderr (journald under systemd). Set a path and
# it becomes the catch-all log: operational/server events (startup, membership,
# anti-entropy) plus every audit category that doesn't have its own file below.
# Each category may override it with its own file (empty = use log_file). Missing
# files are created; categories sharing a path share a handle.
log_file = ""
query_log_file = ""
slow_query_log_file = ""
error_log_file = ""
login_log_file = ""

# External embeddings endpoint for managed vector indexes
# (`CREATE VECTOR INDEX … ON t(text_col) EMBED`): skaidb embeds the text column
# at ingest (out of band, never blocking a write) and auto-embeds a string
# NEAREST query. OpenAI/TEI-compatible: POST url {"model","input":[texts]} ->
# {"data":[{"embedding":[...]}]}.
[inference]
# Every key here can also be set via SKAIDB_INFERENCE_<KEY> env vars
# (e.g. SKAIDB_INFERENCE_API_KEY), applied over this file at startup.
enabled = false
url = ""                     # e.g. "https://api.openai.com/v1/embeddings" or a local TEI URL
model = ""                   # e.g. "text-embedding-3-small"
dim = 0                      # must match the model's output dim and the index DIM
api_key = ""                 # sent as "Authorization: Bearer <api_key>" when set
batch_size = 32
timeout_secs = 30
tls_verify = "ca"            # "ca" (verify against tls_ca) | "system" | "insecure"
tls_ca = ""                  # CA cert (PEM) when tls_verify = "ca"
rerank_url = ""              # cross-encoder endpoint for RERANK (Cohere/Jina/TEI wire);
                             # empty = reranking off. Shares api_key/timeout/TLS above.
rerank_model = ""            # default model; RERANK WITH '<model>' overrides per query
