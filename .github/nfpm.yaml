# nfpm config for building the skaidb .deb / .rpm packages (https://nfpm.goreleaser.com).
# `VERSION` and `NFPM_ARCH` are supplied by the release workflow; the binaries are
# staged into ./staging/ for the target arch before nfpm runs.
name: skaidb
arch: ${NFPM_ARCH}
platform: linux
version: ${VERSION}
section: database
priority: optional
maintainer: skaidb maintainers <release@users.noreply.github.com>
description: |
  skaidb — a schema-less, SQL-speaking, leaderless distributed database.
  Bundles the server (skaidb), the embedded SQL shell (skaidb-cli), and the
  cluster admin client (skaidbctl).
vendor: skaidb
homepage: https://github.com/porcupin26/skaidb
license: SSPL-1.0
contents:
  - src: ./staging/skaidb
    dst: /usr/bin/skaidb
  - src: ./staging/skaidb-cli
    dst: /usr/bin/skaidb-cli
  - src: ./staging/skaidbctl
    dst: /usr/bin/skaidbctl
  - src: ./LICENSE
    dst: /usr/share/doc/skaidb/LICENSE
  - src: ./README.md
    dst: /usr/share/doc/skaidb/README.md
  # systemd service + default config (config files are not overwritten on upgrade)
  - src: ./packaging/skaidb.service
    dst: /lib/systemd/system/skaidb.service
  - src: ./packaging/skaidb.toml
    dst: /etc/skaidb/skaidb.toml
    type: config|noreplace
    file_info:
      mode: 0640
  - src: ./packaging/skaidb.default
    dst: /etc/default/skaidb
    type: config|noreplace

scripts:
  postinstall: ./packaging/postinstall.sh
  preremove: ./packaging/preremove.sh
  postremove: ./packaging/postremove.sh
